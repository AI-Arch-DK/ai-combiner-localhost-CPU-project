# Pre-commit hooks for AI Combiner
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files
#
# SQL linting runs in CI (see .github/workflows/ci.yml)
# sqlfluff is excluded here due to parser limitations with sqlite FTS5/VIRTUAL TABLE

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: |
          (?x)^(
            \.secrets\.baseline|
            CHANGELOG\.md|
            config/environment\.example
          )$

  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.41.0
    hooks:
      - id: markdownlint
        args: ['--ignore', 'CHANGELOG.md', '--config', '.markdownlint.json']
