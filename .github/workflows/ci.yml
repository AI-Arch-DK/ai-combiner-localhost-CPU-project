name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (SQL · JSON · Markdown)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install linting tools
        run: |
          pip install sqlfluff
          npm install -g jsonlint markdownlint-cli

      - name: SQL Lint
        run: |
          find . -name '*.sql' | xargs -r sqlfluff lint --dialect ansi

      - name: JSON Lint
        run: |
          find . -name '*.json' ! -path './.git/*' | xargs -r jsonlint -q

      - name: Markdown Lint
        run: |
          markdownlint '**/*.md' --ignore node_modules --ignore '.git'
