name: Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-secrets:
    name: Secret + Path Sanitization
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sanitize secrets and paths (auto-fix)
        run: |
          echo "🔧 Sanitizing secrets and paths..."

          # --- FIX PATHS ---
          find . -type f \( -name "*.md" -o -name "*.json" -o -name "*.yml" -o -name "*.yaml" -o -name "*.sql" \) \
          -exec sed -i \
          -e 's|~/ai_combiner_kb/ai_combiner_kb.db|./data/ai_combiner_kb.db|g' \
          -e 's|/Users/[^/ ]*/|./data/|g' \
          -e 's|/home/[^/ ]*/|./data/|g' \
          -e 's|C:\\Users\\[^\\ ]*\\|./data/|g' \
          -e 's|D:\\\\[^\\ ]*\\|./data/|g' \
          -e 's|kombain_shared.db|./data/kombain_shared.db|g' \
          {} +

          # --- FIX SCRIPT PATHS ---
          find . -type f \( -name "*.md" -o -name "*.yml" -o -name "*.yaml" \) \
          -exec sed -i \
          -e 's|\bclaude_memory.sh\b|./scripts/claude_memory.sh|g' \
          -e 's|\brotate_logs.sh\b|./scripts/rotate_logs.sh|g' \
          -e 's|\bqwen_index_agent.sh\b|./scripts/qwen_index_agent.sh|g' \
          -e 's|\bupdate_kb.sh\b|./scripts/update_kb.sh|g' \
          {} +

          # --- LIGHT SECRET MASKING ---
          grep -rlE "password\s*=\s*['\"][^'\"]+['\"]" . | while read file; do
            sed -i 's|password\s*=\s*["'\''][^"'\'']*["'\'']|password="***"|g' "$file"
          done

          echo "✅ Sanitization complete"

      - name: Commit fixes
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@local"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔧 auto-fix: sanitize paths & secrets"
            git push
          fi

  lint-sql:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Auto-fix SQL
        run: |
          find . -name "*.sql" ! -path "./.git/*" | xargs -r sqlfluff fix --dialect ansi || true

      - name: Lint SQL files
        run: |
          SQL_FILES=$(find . -name "*.sql" ! -path "./.git/*")
          if [ -z "$SQL_FILES" ]; then
            echo "No SQL files found, skipping."
          else
            echo "$SQL_FILES" | xargs sqlfluff lint --dialect ansi
          fi

  lint-json:
    name: JSON Lint
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install jsonlint
        run: npm install -g jsonlint

      - name: Lint JSON files
        run: |
          find . -name "*.json" ! -path "./.git/*" ! -path "./node_modules/*" \
            | xargs -r jsonlint -q && echo "✅ All JSON valid"

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Auto-fix Markdown
        run: |
          npx markdownlint-cli '**/*.md' --fix || true

      - name: Lint Markdown files
        run: |
          markdownlint '**/*.md' \
            --ignore node_modules \
            --ignore '.git' \
            --ignore 'CHANGELOG.md' \
            --config .markdownlint.json
