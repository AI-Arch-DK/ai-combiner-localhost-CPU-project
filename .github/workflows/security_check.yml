name: Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets in files
        run: |
          echo "🔍 Checking for secrets..."
          if grep -rE "tvly-[a-zA-Z0-9]{20,}|github_pat_[a-zA-Z0-9]+|hf_[a-zA-Z]{20,}|password\s*=\s*['\"][^'\"]{4,}" \
            --include="*.sh" --include="*.json" --include="*.md" \
            --include="*.sql" --include="*.yml" --include="*.yaml" \
            --exclude-dir=.git . 2>/dev/null; then
            echo ""
            echo "❌ SECRETS FOUND! Push blocked."
            exit 1
          else
            echo "✅ No secrets found."
          fi

      - name: Check .gitignore covers sensitive files
        run: |
          echo "📄 Checking .gitignore..."
          for pattern in "*.db" "*.env" "claude_desktop_config.json" "config.env"; do
            if grep -q "$pattern" .gitignore; then
              echo "  ✅ $pattern"
            else
              echo "  ⚠️  $pattern not in .gitignore"
            fi
          done

  lint-sql:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install sqlfluff
        run: pip install sqlfluff
      - name: Lint SQL files
        run: |
          SQL_FILES=$(find . -name "*.sql" ! -path "./.git/*")
          if [ -z "$SQL_FILES" ]; then
            echo "No SQL files found, skipping."
          else
            echo "$SQL_FILES" | xargs sqlfluff lint --dialect ansi
          fi

  lint-json:
    name: JSON Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install jsonlint
        run: npm install -g jsonlint
      - name: Lint JSON files
        run: |
          find . -name "*.json" ! -path "./.git/*" ! -path "./node_modules/*" \
            | xargs -r jsonlint -q && echo "✅ All JSON valid"

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli
      - name: Lint Markdown files
        run: |
          markdownlint '**/*.md' \
            --ignore node_modules \
            --ignore '.git' \
            --ignore 'CHANGELOG.md' \
            --config .markdownlint.json
