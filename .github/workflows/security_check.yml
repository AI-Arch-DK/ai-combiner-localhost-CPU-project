name: Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-secrets:
    name: Secret + Path Sanitization
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanitize secrets and paths (auto-fix)
        run: |
          echo "🔧 Sanitizing secrets and paths..."

          # --- FIX PATHS ---
          find . -type f \( -name "*.md" -o -name "*.json" -o -name "*.yml" -o -name "*.yaml" -o -name "*.sql" \) \
          -exec sed -i \
          -e 's|~/ai_combiner_kb/ai_combiner_kb.db|./data/ai_combiner_kb.db|g' \
          -e 's|/Users/[^/ ]*/|./data/|g' \
          -e 's|/home/[^/ ]*/|./data/|g' \
          -e 's|C:\\Users\\[^\\ ]*\\|./data/|g' \
          -e 's|D:\\\\[^\\ ]*\\|./data/|g' \
          -e 's|kombain_shared.db|./data/kombain_shared.db|g' \
          {} +

          # --- FIX SCRIPT PATHS ---
          find . -type f \( -name "*.md" -o -name "*.yml" -o -name "*.yaml" \) \
          -exec sed -i \
          -e 's|\bclaude_memory.sh\b|./scripts/claude_memory.sh|g' \
          -e 's|\brotate_logs.sh\b|./scripts/rotate_logs.sh|g' \
          -e 's|\bqwen_index_agent.sh\b|./scripts/qwen_index_agent.sh|g' \
          -e 's|\bupdate_kb.sh\b|./scripts/update_kb.sh|g' \
          {} +

          # --- SECRET MASKING (расширенный список) ---
          grep -rlE "(password|api_key|token|secret|passwd|pwd)\s*=\s*['\"][^'\"]+['\"]" . \
            --include="*.yml" --include="*.yaml" --include="*.json" \
            --include="*.md" --include="*.sql" --include="*.env" \
            --include="*.py" --include="*.sh" \
          | grep -v ".git/" \
          | while read file; do
            sed -i -E \
              's|(password|api_key|token|secret|passwd|pwd)(\s*=\s*)["'"'"'][^"'"'"']*["'"'"']|\1\2"***"|gi' \
              "$file"
          done

          echo "✅ Sanitization complete"

      - name: Commit fixes
        run: |
          git config --global user.name "ci-bot"
          git config --global user.email "ci@local"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔧 auto-fix: sanitize paths & secrets [skip ci]"
            git push
          fi

  lint-yaml:
    name: YAML Lint
    runs-on: ubuntu-latest
    needs: check-secrets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          YAML_FILES=$(find . -name "*.yml" -o -name "*.yaml" | grep -v ".git/")
          if [ -z "$YAML_FILES" ]; then
            echo "No YAML files found, skipping."
          else
            echo "$YAML_FILES" | xargs yamllint -d "{extends: relaxed, rules: {line-length: {max: 160}}}" \
              2>&1 | tee yaml-lint.log || true
            echo "✅ YAML lint complete"
          fi

      - name: Upload YAML lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: yaml-lint-results
          path: yaml-lint.log
          if-no-files-found: ignore

  lint-sql:
    name: SQL Lint (sqlfluff)
    runs-on: ubuntu-latest
    needs: check-secrets

    strategy:
      matrix:
        python-version: ['3.10', '3.11']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install sqlfluff
        run: pip install sqlfluff

      - name: Auto-fix SQL
        run: |
          find . -name "*.sql" ! -path "./.git/*" | xargs -r sqlfluff fix --dialect ansi || true

      - name: Lint SQL files
        run: |
          SQL_FILES=$(find . -name "*.sql" ! -path "./.git/*")
          if [ -z "$SQL_FILES" ]; then
            echo "No SQL files found, skipping."
          else
            echo "$SQL_FILES" | xargs sqlfluff lint --dialect ansi \
              2>&1 | tee sql-lint-py${{ matrix.python-version }}.log
          fi

      - name: Upload SQL lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sql-lint-results-py${{ matrix.python-version }}
          path: sql-lint-py${{ matrix.python-version }}.log
          if-no-files-found: ignore

  lint-json:
    name: JSON Lint
    runs-on: ubuntu-latest
    needs: check-secrets

    strategy:
      matrix:
        node-version: ['22']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install jsonlint
        run: npm install -g jsonlint

      - name: Lint JSON files
        run: |
          find . -name "*.json" ! -path "./.git/*" ! -path "./node_modules/*" \
            | xargs -r jsonlint -q \
            2>&1 | tee json-lint.log && echo "✅ All JSON valid"

      - name: Upload JSON lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: json-lint-results
          path: json-lint.log
          if-no-files-found: ignore

  lint-markdown:
    name: Markdown Lint
    runs-on: ubuntu-latest
    needs: check-secrets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Create markdownlint config if missing
        run: |
          if [ ! -f .markdownlint.json ]; then
            echo '{
              "default": true,
              "MD013": false,
              "MD033": false,
              "MD041": false,
              "MD024": false
            }' > .markdownlint.json
            echo "📝 Created default .markdownlint.json"
          fi

      - name: Auto-fix Markdown
        run: |
          npx markdownlint-cli '**/*.md' --fix \
            --ignore node_modules \
            --ignore '.git' \
            --config .markdownlint.json || true

      - name: Lint Markdown files
        run: |
          markdownlint '**/*.md' \
            --ignore node_modules \
            --ignore '.git' \
            --ignore 'CHANGELOG.md' \
            --config .markdownlint.json \
            2>&1 | tee markdown-lint.log && echo "✅ Markdown lint complete"

      - name: Upload Markdown lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-lint-results
          path: markdown-lint.log
          if-no-files-found: ignore

  lint-python:
    name: Python Lint (ruff)
    runs-on: ubuntu-latest
    needs: check-secrets

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Auto-fix Python
        run: |
          PY_FILES=$(find . -name "*.py" ! -path "./.git/*" ! -path "./node_modules/*")
          if [ -z "$PY_FILES" ]; then
            echo "No Python files found, skipping."
          else
            ruff check --fix . || true
            ruff format . || true
          fi

      - name: Lint Python files
        run: |
          PY_FILES=$(find . -name "*.py" ! -path "./.git/*" ! -path "./node_modules/*")
          if [ -z "$PY_FILES" ]; then
            echo "No Python files found, skipping."
          else
            ruff check . 2>&1 | tee python-lint.log && echo "✅ Python lint complete"
          fi

      - name: Upload Python lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-lint-results
          path: python-lint.log
          if-no-files-found: ignore

  lint-shell:
    name: Shell Lint (shellcheck)
    runs-on: ubuntu-latest
    needs: check-secrets

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          SH_FILES=$(find . -name "*.sh" ! -path "./.git/*")
          if [ -z "$SH_FILES" ]; then
            echo "No shell scripts found, skipping."
          else
            echo "$SH_FILES" | xargs shellcheck --severity=warning \
              2>&1 | tee shell-lint.log && echo "✅ Shell lint complete"
          fi

      - name: Upload shell lint results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shell-lint-results
          path: shell-lint.log
          if-no-files-found: ignore

  summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    needs: [lint-yaml, lint-sql, lint-json, lint-markdown, lint-python, lint-shell]
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: lint-reports

      - name: Print summary
        run: |
          echo "## 📋 Lint Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for f in lint-reports/**/*.log; do
            echo "### $(basename $f)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat "$f" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done
